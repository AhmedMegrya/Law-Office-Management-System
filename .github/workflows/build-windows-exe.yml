name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller==5.13.2

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller ^
        --onefile ^
        --windowed ^
        --name "LawOfficeSystem" ^
        --add-data "pages;pages" ^
        --hidden-import PyQt5.QtPrintSupport ^
        --hidden-import PyQt5.QtSvg ^
        --hidden-import sqlite3 ^
        --exclude-module multiprocessing ^
        main.py

    - name: Prepare Portable Folder
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "LawOfficeSystem_Portable"
        New-Item -ItemType Directory -Force -Path "LawOfficeSystem_Portable\Archive"
        New-Item -ItemType Directory -Force -Path "LawOfficeSystem_Portable\Backups"

        Copy-Item "dist\LawOfficeSystem.exe" "LawOfficeSystem_Portable\" -Force

        if (Test-Path "INSTALL_WINDOWS7.txt") {
          Copy-Item "INSTALL_WINDOWS7.txt" "LawOfficeSystem_Portable\" -Force
        }

        if (Test-Path "README.md") {
          Copy-Item "README.md" "LawOfficeSystem_Portable\" -Force
        }

        if (Test-Path "law_office.db") {
          Copy-Item "law_office.db" "LawOfficeSystem_Portable\" -Force
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LawOfficeSystem_Portable_Windows
        path: LawOfficeSystem_Portable/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          LawOfficeSystem_Portable/LawOfficeSystem.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
